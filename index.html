<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Inventario QR</title>

  <!-- Librerías externas -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jsbarcode/3.11.5/JsBarcode.all.min.js"></script>
  
  <!--  FIREBASE -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

  <!-- Estilos propios -->
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
  <div class="icon-box">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/>
      <rect x="14" y="14" width="3" height="3"/><rect x="18" y="14" width="3" height="3"/><rect x="14" y="18" width="3" height="3"/><rect x="18" y="18" width="3" height="3"/>
    </svg>
  </div>
  <h1>INVENTARIO QR/CODIGO DE BARRAS</h1>
  <span class="version">v2.1  FIREBASE</span>
</header>

<div class="tabs">
  <button class="tab active" onclick="switchTab('gen')">+ Generar QR / Código de barras</button>
  <button class="tab" onclick="switchTab('qrs')">Códigos QR generados</button>
  <button class="tab" onclick="switchTab('bars')">Códigos de barras generados</button>
  <button class="tab" onclick="switchTab('search')">🔍 Buscar equipos</button>
</div>

<!-- ═══════════════════════════════════════════════ PANEL: GENERAR -->
<div id="panel-gen" class="panel active">
<main>
  <p class="section-title">Datos del equipo</p>

  <div class="form-grid">
    <div class="field full">
      <label>ID del equipo * (asígnalo tú)</label>
      <input type="text" id="f-id" placeholder="Ej: EQ-001, LAP-2024-003, PC-OFICINA-05">
    </div>
    <!-- ... resto del formulario IGUAL ... -->
    <div class="field">
      <label>Nombre del equipo *</label>
      <input type="text" id="f-nombre" placeholder="Laptop Dell Inspiron">
    </div>
    <div class="field">
      <label>Número de serie</label>
      <input type="text" id="f-serie" placeholder="SN-2024-001">
    </div>
    <div class="field">
      <label>Marca / Modelo</label>
      <input type="text" id="f-modelo" placeholder="Dell Inspiron 15 3520">
    </div>
    <div class="field">
      <label>Categoría</label>
      <select id="f-categoria">
        <option value="">Seleccionar...</option>
        <option>Laptop</option>
        <option>Computadora de escritorio</option>
        <option>Monitor</option>
        <option>Impresora</option>
        <option>Teléfono</option>
        <option>Tablet</option>
        <option>Servidor</option>
        <option>Switch / Router</option>
        <option>Proyector</option>
        <option>Otro</option>
      </select>
    </div>
    <div class="field">
      <label>Ubicación</label>
      <input type="text" id="f-ubicacion" placeholder="Oficina 3, Piso 2">
    </div>
    <div class="field">
      <label>Responsable</label>
      <input type="text" id="f-responsable" placeholder="Juan García">
    </div>
    <div class="field">
      <label>Estado</label>
      <select id="f-estado">
        <option value="Bueno">Bueno</option>
        <option value="Regular">Regular</option>
        <option value="Malo">Malo</option>
        <option value="En reparación">En reparación</option>
        <option value="De baja">De baja</option>
      </select>
    </div>
    <div class="field">
      <label>Fecha de registro</label>
      <input type="date" id="f-fecha">
    </div>
    <div class="field full">
      <label>Notas / Observaciones</label>
      <textarea id="f-notas" placeholder="Accesorios incluidos, características especiales, etc."></textarea>
    </div>
  </div>

  <div class="btn-row">
    <button class="btn-primary" onclick="generateAll()">
      <span id="gen-btn-text">Generar</span>
      <span id="gen-loading" style="display:none;"> Guardando...</span>
    </button>
    <button onclick="clearForm()">Limpiar</button>
  </div>

  <div id="gen-output"></div>
</main>
</div>

<!-- ═══════════════════════════════════════════════ PANEL: QRs -->
<div id="panel-qrs" class="panel">
<main>
  <p class="section-title">Códigos QR generados</p>
  <div class="info-box" id="qr-info" style="display:none;">
    <span id="qr-count">0</span> equipo<span id="qr-plural"></span> registrado<span id="qr-plural2"></span>
  </div>
  <div id="all-qr-list"></div>
  <div class="actions-bar" id="qr-actions" style="display:none;">
    <button class="btn-primary" onclick="printPanel('qrs')"> Imprimir todos los QR</button>
    <button class="btn-danger" onclick="clearAll()"> Borrar todos</button>
  </div>
</main>
</div>

<!-- ═══════════════════════════════════════════════ PANEL: BARRAS -->
<div id="panel-bars" class="panel">
<main>
  <p class="section-title">Códigos de barras generados</p>
  <div class="info-box" id="bar-info" style="display:none;">
    <span id="bar-count">0</span> equipo<span id="bar-plural"></span> registrado<span id="bar-plural2"></span>
  </div>
  <div id="all-bar-list"></div>
  <div class="actions-bar" id="bar-actions" style="display:none;">
    <button class="btn-primary" onclick="printPanel('bars')"> Imprimir todos los códigos de barras</button>
    <button class="btn-danger" onclick="clearAll()"> Borrar todos</button>
  </div>
</main>
</div>

<!--  ═══════════════════════════════════════════════ PANEL: BUSCADOR -->
<div id="panel-search" class="panel">
<main>
  <p class="section-title"> Buscar equipos</p>
  
  <div class="field full">
    <label>Buscar por ID, nombre, serie o responsable</label>
    <input type="text" id="search-input" placeholder="Ej: LAP-001, Dell, Juan García..." 
           oninput="debouncedSearch(this.value)">
  </div>
  
  <div id="search-results" class="search-results">
    <div class="empty-msg">
      Escribe para buscar entre todos tus equipos...<br>
      <small>Busca por ID, nombre, serie, modelo, responsable o ubicación</small>
    </div>
  </div>
</main>
</div>

<script src="app.js"></script>
</body>
</html>
